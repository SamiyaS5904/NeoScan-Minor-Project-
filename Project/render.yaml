services:
  # 1. The Python Backend (Web Service)
  - type: web
    name: neoscan-backend
    env: python
    region: ohio
    plan: free
    rootDir: neoscan_backend/backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0

  # 2. The React Frontend (Static Site)
  - type: web
    name: neoscan-frontend
    env: static
    region: ohio
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: neoscan-backend
          envVarKey: RENDER_EXTERNAL_URL
